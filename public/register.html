<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="Create a free LocShare account and start sharing your live location with family and friends.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>Register — LocShare</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <a href="/" class="logo logo-center">
      <span class="logo-icon">📍</span>
      <span>LocShare</span>
    </a>
    <h1>Create account</h1>
    <p class="auth-sub">Join LocShare and start sharing safely</p>

    <form id="registerForm">
      <div class="field">
        <label for="username">Display name</label>
        <input type="text" id="username" required placeholder="Alex" autocomplete="username">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" required minlength="6" placeholder="At least 6 characters" autocomplete="new-password">
          <button type="button" class="btn-eye" id="togglePassword" aria-label="Show password">👁</button>
        </div>
      </div>
      <div id="error" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/pwa.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('password');
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('error');
      errEl.classList.add('hidden');

      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const data = await api('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        setSession(data.token, data.user);
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
